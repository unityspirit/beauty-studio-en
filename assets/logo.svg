<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="gbs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A94B"/>
      <stop offset="100%" stop-color="#b8912f"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#1a1a2e"/>
  <circle cx="100" cy="100" r="82" fill="none" stroke="url(#gbs)" stroke-width="2"/>
  <!-- Scissors -->
  <circle cx="80" cy="65" r="12" fill="none" stroke="url(#gbs)" stroke-width="2.5"/>
  <circle cx="120" cy="65" r="12" fill="none" stroke="url(#gbs)" stroke-width="2.5"/>
  <line x1="87" y1="75" x2="113" y2="95" stroke="url(#gbs)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="113" y1="75" x2="87" y2="95" stroke="url(#gbs)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Mirror / vanity mirror -->
  <ellipse cx="100" cy="125" rx="25" ry="20" fill="none" stroke="url(#gbs)" stroke-width="2"/>
  <line x1="100" y1="145" x2="100" y2="160" stroke="url(#gbs)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="85" y1="160" x2="115" y2="160" stroke="url(#gbs)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Sparkles -->
  <circle cx="55" cy="100" r="3" fill="url(#gbs)" opacity="0.6"/>
  <circle cx="145" cy="100" r="3" fill="url(#gbs)" opacity="0.6"/>
  <circle cx="60" cy="120" r="2" fill="url(#gbs)" opacity="0.4"/>
  <circle cx="140" cy="120" r="2" fill="url(#gbs)" opacity="0.4"/>
  <!-- Lipstick accent -->
  <rect x="42" cy="130" y="130" width="6" height="18" rx="2" fill="url(#gbs)" opacity="0.5"/>
  <rect x="42" y="125" width="6" height="8" rx="3" fill="url(#gbs)" opacity="0.7"/>
</svg>
